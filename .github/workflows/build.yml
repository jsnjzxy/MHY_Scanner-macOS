name: Build macOS

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    name: Build on macOS ${{ matrix.arch }}
    runs-on: macos-15

    strategy:
      matrix:
        arch: [arm64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        brew install cmake ninja pkg-config autoconf autoconf-archive automake libtool
        # libtool 安装后命令是 glibtoolize，创建软链接兼容脚本
        if [ ! -f "$(brew --prefix)/bin/libtoolize" ]; then
          ln -sf "$(brew --prefix)/bin/glibtoolize" "$(brew --prefix)/bin/libtoolize"
        fi

    - name: Run vcpkg
      env:
        VCPKG_MAX_CONCURRENCY: 2
        VCPKG_BUILD_TYPE: release
        MAKEFLAGS: "-j2"
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: 'vcpkg.json'

    - name: Build project (Release)
      run: |
        export VCPKG_ROOT="${GITHUB_WORKSPACE}/vcpkg"
        # 创建 vcpkg 二进制缓存目录
        mkdir -p "$HOME/.vcpkg/cache"
        chmod +x scripts/build_mac_vcpkg.sh
        ./scripts/build_mac_vcpkg.sh Release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MHY_Scanner-macOS-${{ matrix.arch }}-Release
        path: Release_build/bin/**/MHY_Scanner.app
        retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: macos-15
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create DMG packages
      run: |
        for app in artifacts/*/MHY_Scanner.app; do
          if [ -d "$app" ]; then
            appname=$(basename "$app")
            appdir=$(dirname "$app")
            arch=$(basename "$appdir" | cut -d- -f3)

            hdiutil create -volname "MHY_Scanner" \
              -srcfolder "$app" \
              -ov -format UDZO \
              "MHY_Scanner-macOS-${arch}.dmg"
          fi
        done

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: MHY_Scanner-macOS-*.dmg
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
